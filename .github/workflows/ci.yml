name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build · vet · test · self-host gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          # Pull the newest patch of the go.mod minor line rather than the
          # runner's cached one — the cache can lag a patch, and govulncheck
          # gates on stdlib CVEs fixed in the latest patch.
          check-latest: true
          cache: true

      - name: gofmt (must be clean)
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build -o vendkit ./cmd/vendkit

      - name: test (unit + end-to-end scenario kit)
        run: go test ./...

      - name: self-host manifest freshness gate
        # VendKit is its own first publisher: the checked-in manifest must match
        # what the engine generates from vendkit-export.yml. A drifted manifest
        # fails the build (non-zero exit).
        run: ./vendkit generate --check

  govulncheck:
    name: govulncheck (stdlib + deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          # Pull the newest patch of the go.mod minor line rather than the
          # runner's cached one — the cache can lag a patch, and govulncheck
          # gates on stdlib CVEs fixed in the latest patch.
          check-latest: true
          cache: true

      # Scans the code's actual call graph against the Go vulnerability
      # database — stdlib/toolchain and the one module dep. Blocking: a
      # reachable vulnerability fails the build. If this ever fires on a fresh
      # stdlib CVE, the fix is to bump the Go version in go.mod.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
