name: Pages

# Deploys the static landing page in site/ to GitHub Pages. The page is a
# single self-contained HTML file (inline CSS/JS) plus og-image.png and a
# .nojekyll marker; there is no build step.

on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; let a newer push finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: build · upload · deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: upload site/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
