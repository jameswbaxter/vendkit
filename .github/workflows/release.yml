name: Release

# Cut a release by pushing a SemVer tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# Builds static binaries for every supported platform, checksums them, and
# publishes a GitHub Release with the binaries + SHA256SUMS.txt attached
# (DR-0016: the engine ships as a checksummed, pinnable artefact).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # pre-releases: v1.2.3-rc.1

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    name: build · checksum · publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Verify (build · vet · test) before releasing
        run: |
          go vet ./...
          go test ./...

      - name: Cross-compile release binaries
        env:
          VERSION: ${{ github.ref_name }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"
          for t in $targets; do
            os=${t%/*}; arch=${t#*/}
            out="dist/vendkit_${VERSION}_${os}_${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "building $out"
            GOOS=$os GOARCH=$arch go build -trimpath -ldflags='-s -w' -o "$out" ./cmd/vendkit
          done

      - name: Checksums
        working-directory: dist
        run: sha256sum vendkit_* > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/vendkit_*
            dist/SHA256SUMS.txt
          generate_release_notes: true

      # Push hints (DR-0006, platform-integration §4): after the release is
      # published, nudge subscribers listed in .vendkit/subscribers.yml so
      # their sync pipelines run early. Pull remains the source of truth, so
      # this is strictly best-effort — guarded to a no-op when no subscribers
      # file exists, and continue-on-error so a failed hint never fails the
      # release. Opt in by adding .vendkit/subscribers.yml + the dispatch token.
      - name: Push-hint subscribers (best-effort)
        if: ${{ hashFiles('.vendkit/subscribers.yml') != '' }}
        continue-on-error: true
        env:
          # Dispatch-scoped token — the one publisher-held credential the model
          # permits (security-model §4). Distinct from any PR token.
          VENDKIT_TOKEN_PUSH_HINT: ${{ secrets.VENDKIT_TOKEN_PUSH_HINT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: go run ./cmd/vendkit push-hint --version "${{ github.ref_name }}"
