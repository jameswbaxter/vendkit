<text x="452" y="298" text-anchor="middle" font-size="12" font-weight="600" fill="#d2a04a">vendkit gate</text>
<text x="452" y="328" text-anchor="middle" font-size="9.5" fill="#5c716a">verifies checksum manifest</text>
<rect x="546" y="250" width="132" height="30" rx="8" fill="rgba(79,191,133,.1)" stroke="#23503b"></rect>
