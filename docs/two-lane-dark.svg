<text x="102" y="224" text-anchor="middle" font-size="10" fill="#8da39b">release</text>

<rect x="704" y="64" width="148" height="272" rx="12" fill="#101917" stroke="#1d2926"></rect>
<text x="778" y="92" text-anchor="middle" font-size="10" letter-spacing="1.6" font-weight="600" fill="#5c716a">CONSUMER</text>
<text x="778" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#e9efec">product repo</text>
<rect x="720" y="132" width="116" height="24" rx="7" fill="#18241f"></rect>
<text x="778" y="148" text-anchor="middle" font-size="10.5" fill="#8da39b">CLAUDE.md</text>
