<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 368" role="img" aria-label="Two-lane diagram: publisher releases flow through the sync lane as one reviewed PR into the consumer; the gate lane runs on every consumer PR and blocks hand-edits of vendored files. Composition invariant: the sync lane&#39;s output always passes the gate lane." font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,&#39;Liberation Mono&#39;,monospace">
<defs>
<marker id="ao" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8z" fill="#4fbf85"></path></marker>
