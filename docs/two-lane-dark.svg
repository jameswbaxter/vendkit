<text x="778" y="314" text-anchor="middle" font-size="10" fill="#8da39b">first-party code</text>

<rect x="196" y="64" width="488" height="124" rx="12" fill="rgba(79,191,133,.05)" stroke="#23503b"></rect>
<text x="216" y="88" font-size="10.5" font-weight="700" letter-spacing="1.4" fill="#4fbf85">SYNC LANE</text>
<text x="664" y="88" text-anchor="end" font-size="10" fill="#8da39b">one reviewed PR per upgrade</text>
